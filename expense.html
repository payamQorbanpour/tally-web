<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>Open expense in Tally</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="apple-touch-icon" href="/assets/icon.png" />
  <style>
    :root {
      --brand: #0E494E;
      --brand-2: #14686f;
      --bg: #f5f7f7;
      --text: #0d2024;
      --muted: #5b7479;
      --card: #ffffff;
      --border: #e3eaeb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(160deg, #eaf2f3 0%, #f8fafa 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px 28px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 12px 30px rgba(14, 73, 78, 0.08);
      text-align: center;
    }
    .logo {
      width: 80px; height: 80px;
      margin: 0 auto 18px;
      border-radius: 18px;
      object-fit: cover;
      display: block;
    }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    p.lede { color: var(--muted); font-size: 15px; line-height: 1.45; margin-bottom: 22px; }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.05s ease, background 0.15s ease;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover { background: var(--brand-2); }
    .btn-ghost {
      background: transparent;
      color: var(--brand);
      border: 1px solid var(--border);
    }
    .row { display: flex; gap: 10px; margin-top: 12px; }
    .row .btn { flex: 1; padding: 12px; font-size: 14px; }
    .hint { margin-top: 16px; font-size: 12px; color: var(--muted); }
    .token { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: var(--muted); margin-top: 18px; word-break: break-all; }
  </style>
</head>
<body>
  <main class="card" role="main">
    <img class="logo" src="/assets/icon.png" alt="Tally" />
    <h1 id="title">Shared expense on Tally</h1>
    <p class="lede" id="lede">Open the app to view this expense and settle up with your group. If you're not in the group yet, Tally will add you.</p>

    <a id="open" class="btn btn-primary" href="#">Open in Tally</a>

    <div class="row">
      <a id="ios" class="btn btn-ghost" href="https://apps.apple.com/app/id0000000000" target="_blank" rel="noopener">App Store</a>
      <a id="android" class="btn btn-ghost" href="https://play.google.com/store/apps/details?id=com.payamqorbanpour.tally" target="_blank" rel="noopener">Google Play</a>
    </div>

    <p class="hint">If the app didn't open automatically, tap "Open in Tally" above.</p>
    <p class="token" id="tokenLine"></p>
  </main>

  <script>
    (function () {
      var path = window.location.pathname.replace(/\/+$/, "");
      var parts = path.split("/").filter(Boolean);
      var id = parts[parts.length - 1] === "expense.html"
        ? null
        : parts[parts.length - 1] || null;

      // Optional ?g=<group_token> (alias: ?group=) — passed through so the
      // app can add the user to the parent group as part of opening the
      // expense, rather than relying on a separate group-invite step.
      var qs = new URLSearchParams(window.location.search);
      var groupToken = qs.get("g") || qs.get("group") || null;

      if (!id) {
        document.getElementById("title").textContent = "Invalid expense link";
        document.getElementById("lede").textContent = "This expense link is missing its id. Ask your friend to resend it.";
        document.getElementById("open").style.display = "none";
        return;
      }

      var deepLink = "tally://expense-invite?id=" + encodeURIComponent(id);
      var tokenLine = "Expense: " + id;
      if (groupToken) {
        deepLink += "&group=" + encodeURIComponent(groupToken);
        tokenLine += " · Group token: " + groupToken;
      }
      document.getElementById("open").setAttribute("href", deepLink);
      document.getElementById("tokenLine").textContent = tokenLine;

      var attempted = false;
      function tryOpen() {
        if (attempted) return;
        attempted = true;
        window.location.href = deepLink;
      }
      setTimeout(tryOpen, 250);
    })();
  </script>
</body>
</html>
